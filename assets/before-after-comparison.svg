<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#131a2b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />
  
  <!-- Border glow -->
  <rect x="10" y="10" width="1180" height="610" fill="none" stroke="#00f5ff" stroke-width="3" rx="20" opacity="0.6"/>
  
  <!-- Header -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="url(#titleGrad)">⚡ IRCTC UX Redesign</text>
  <text x="600" y="120" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#888">Transforming India's Most Frustrating Booking Portal</text>
  
  <!-- Before Box -->
  <rect x="50" y="160" width="500" height="350" fill="#2d1b1b" stroke="#ff4757" stroke-width="3" rx="12"/>
  <text x="300" y="200" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#ff4757">❌ BEFORE</text>
  
  <text x="80" y="250" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ff4757">12 STEPS</text>
  <text x="80" y="285" font-family="Arial, sans-serif" font-size="20" fill="#ccc">4.2 MINUTES</text>
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="20" fill="#ccc">68% DROP-OFF</text>
  <text x="80" y="355" font-family="Arial, sans-serif" font-size="20" fill="#ccc">3-4 CAPTCHAs</text>
  
  <!-- After Box -->
  <rect x="650" y="160" width="500" height="350" fill="#1b2d1b" stroke="#2ed573" stroke-width="3" rx="12"/>
  <text x="900" y="200" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#2ed573">✅ AFTER</text>
  
  <text x="680" y="250" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2ed573">5 STEPS</text>
  <text x="680" y="285" font-family="Arial, sans-serif" font-size="20" fill="#ccc">1.8 MINUTES</text>
  <text x="680" y="320" font-family="Arial, sans-serif" font-size="20" fill="#ccc">30% DROP-OFF</text>
  <text x="680" y="355" font-family="Arial, sans-serif" font-size="20" fill="#ccc">0 CAPTCHAs</text>
  
  <!-- Impact Metrics -->
  <rect x="100" y="540" width="1000" height="70" fill="#1a1a2e" stroke="#00f5ff" stroke-width="2" rx="10"/>
  <text x="600" y="575" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#00f5ff">-57% TIME  |  -56% DROP-OFF  |  $2.3M RECOVERED</text>
  <text x="600" y="605" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#888">github.com/ayyushnegii/ux-redesign-case-study</text>
</svg>
