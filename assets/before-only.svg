<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b1b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d1b1b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGrad)" />
  <rect x="10" y="10" width="1180" height="610" fill="none" stroke="#ff4757" stroke-width="4" rx="20"/>
  
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="64" font-weight="bold" text-anchor="middle" fill="#ff4757">❌ BEFORE</text>
  <text x="600" y="130" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#888">IRCTC Original Experience</text>
  
  <!-- Metrics -->
  <circle cx="300" cy="250" r="80" fill="none" stroke="#ff4757" stroke-width="3"/>
  <text x="300" y="245" font-family="Arial" font-size="36" font-weight="bold" text-anchor="middle" fill="#ff4757">12</text>
  <text x="300" y="280" font-family="Arial" font-size="18" text-anchor="middle" fill="#ccc">STEPS</text>
  
  <circle cx="600" cy="250" r="80" fill="none" stroke="#ff4757" stroke-width="3"/>
  <text x="600" y="245" font-family="Arial" font-size="36" font-weight="bold" text-anchor="middle" fill="#ff4757">4.2</text>
  <text x="600" y="280" font-family="Arial" font-size="18" text-anchor="middle" fill="#ccc">MINUTES</text>
  
  <circle cx="900" cy="250" r="80" fill="none" stroke="#ff4757" stroke-width="3"/>
  <text x="900" y="245" font-family="Arial" font-size="36" font-weight="bold" text-anchor="middle" fill="#ff4757">68%</text>
  <text x="900" y="280" font-family="Arial" font-size="18" text-anchor="middle" fill="#ccc">DROP-OFF</text>
  
  <!-- Problems -->
  <text x="600" y="400" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle" fill="#ff4757">PROBLEMS</text>
  <text x="200" y="450" font-family="Arial" font-size="20" fill="#ccc">✗ 3-4 CAPTCHAs</text>
  <text x="200" y="485" font-family="Arial" font-size="20" fill="#ccc">✗ 42 homepage elements</text>
  <text x="200" y="520" font-family="Arial" font-size="20" fill="#ccc">✗ Desktop-only design</text>
  <text x="700" y="450" font-family="Arial" font-size="20" fill="#ccc">✗ 50+ train results</text>
  <text x="700" y="485" font-family="Arial" font-size="20" fill="#ccc">✗ 3 payment redirects</text>
  <text x="700" y="520" font-family="Arial" font-size="20" fill="#ccc">✗ Manual data entry</text>
  
  <text x="600" y="590" font-family="Arial" font-size="18" text-anchor="middle" fill="#888">github.com/ayyushnegii/ux-redesign-case-study</text>
</svg>
