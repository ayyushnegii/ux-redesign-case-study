<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>IRCTC Redesigned - Real Mobile UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    
    .phone {
      width: 375px;
      height: 812px;
      background: #0a0e17;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 8px solid #1a1a1a;
    }
    
    .status-bar {
      height: 44px;
      background: #0a0e17;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      color: #e0e0e0;
      font-size: 14px;
      font-weight: 600;
    }
    
    .header {
      background: linear-gradient(135deg, #00f5ff 0%, #ff00ff 100%);
      color: #0a0e17;
      padding: 16px 20px;
      font-weight: bold;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .search-card {
      margin: 16px;
      background: #131a2b;
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #2a3a5c;
    }
    
    .input-group {
      margin-bottom: 16px;
    }
    
    .input-group label {
      display: block;
      color: #00f5ff;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .input-group input, .input-group select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #2a3a5c;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 16px;
    }
    
    .quick-tags {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    
    .tag {
      background: rgba(0,245,255,0.1);
      border: 1px solid #00f5ff;
      color: #00f5ff;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
    }
    
    .search-btn {
      margin: 16px;
      background: linear-gradient(135deg, #00f5ff 0%, #ff00ff 100%);
      color: #0a0e17;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }
    
    .features {
      margin: 16px;
      padding: 16px;
      background: rgba(0,245,255,0.05);
      border: 1px solid #00f5ff;
      border-radius: 12px;
    }
    
    .features p {
      color: #e0e0e0;
      font-size: 14px;
      margin: 8px 0;
    }
    
    .features .check { color: #39ff14; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span>🔋 100%</span>
    </div>
    
    <div class="header">
      🚂 IRCTC Redesigned
    </div>
    
    <div class="search-card">
      <div class="input-group">
        <label>FROM</label>
        <input type="text" value="Delhi (DLI)" style="color: #e0e0e0;">
      </div>
      
      <div class="input-group">
        <label>TO</label>
        <input type="text" value="Mumbai (CST)">
      </div>
      
      <div class="input-group">
        <label>DATE</label>
        <input type="date" value="2026-04-30">
      </div>
      
      <div class="input-group">
        <label>CLASS</label>
        <select>
          <option>Sleeper (SL)</option>
          <option>3A - AC</option>
        </select>
      </div>
      
      <div class="quick-tags">
        <span class="tag">📍 Recent: Delhi→Agra</span>
        <span class="tag">⭐ Popular: Delhi→Mumbai</span>
      </div>
    </div>
    
    <div class="search-btn">
      🔍 SEARCH TRAINS
    </div>
    
    <div class="features">
      <p class="check">✓ No CAPTCHA needed</p>
      <p class="check">✓ Saved preferences loaded</p>
      <p class="check">✓ Mobile optimized</p>
      <p class="check">✓ 5-step booking</p>
    </div>
  </div>
</body>
</html>
